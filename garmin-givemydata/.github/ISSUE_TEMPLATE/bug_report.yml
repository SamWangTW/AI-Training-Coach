name: Bug Report
description: Something isn't working
labels: [bug]
body:
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "e.g., macOS 15.2, Ubuntu 24.04, Windows 11"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g., 3.12.3 (run: python3 --version)"
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Install method
      options:
        - brew install nrvim/tap/garmin-givemydata
        - pip install garmin-givemydata
        - git clone
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "e.g., 0.1.2 (check pyproject.toml or pip show garmin-givemydata)"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Full terminal output
      render: shell
      placeholder: Paste the complete output here
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `garmin-givemydata`
        2. ...
    validations:
      required: true
